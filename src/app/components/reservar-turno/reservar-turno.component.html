<div class="reservar-turno-container">
  <div class="reservar-card">
    <button (click)="volver()" class="btn-back">← Volver</button>

    <h1>Reservar Turno</h1>

    <div *ngIf="success" class="success-message">
      ¡Turno reservado exitosamente! Redirigiendo...
    </div>

    <form [formGroup]="reservaForm" (ngSubmit)="onSubmit()" *ngIf="!success">
      <div class="form-group">
        <label>Servicio</label>
        <select formControlName="servicio_id" class="form-input">
          <option value="">Selecciona un servicio</option>
          <option *ngFor="let servicio of servicios" [value]="servicio.id">
            {{ servicio.nombre }} - ${{ servicio.precio }}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label>Barbero</label>
        <select formControlName="barbero_id" class="form-input">
          <option value="">Selecciona un barbero</option>
          <option *ngFor="let barbero of barberos" [value]="barbero.id">
            Barbero #{{ barbero.id }}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label>Fecha</label>
        <input
          type="date"
          formControlName="fecha"
          class="form-input"
          [min]="getMinFecha()"
        />
      </div>

      <div class="form-group">
        <label>Horario disponible</label>
        <div class="horarios-grid">
          <button
            *ngFor="let horario of horariosDisponibles"
            type="button"
            [class.selected]="reservaForm.get('hora_inicio')?.value === horario"
            (click)="reservaForm.patchValue({ hora_inicio: horario })"
            class="horario-btn"
          >
            {{ horario }}
          </button>
        </div>
      </div>

      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>

      <button
        type="submit"
        [disabled]="reservaForm.invalid || loading"
        class="btn-primary"
      >
        {{ loading ? 'Confirmando...' : 'Confirmar Reserva' }}
      </button>
    </form>
  </div>
</div>
