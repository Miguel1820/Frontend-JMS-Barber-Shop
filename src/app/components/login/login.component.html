<div class="login-container">
  <div class="login-card">
    <div class="logo">✂</div>
    <h1>JMS Barber Shop</h1>
    <p class="subtitle">Inicia sesión para continuar</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <input
          type="email"
          placeholder="Correo electrónico"
          formControlName="email"
          class="form-input"
        />
      </div>

      <div class="form-group">
        <input
          type="password"
          placeholder="Contraseña"
          formControlName="password"
          class="form-input"
        />
      </div>

      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>

      <button
        type="submit"
        [disabled]="loginForm.invalid || loading"
        class="btn-primary"
      >
        {{ loading ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>

    <p class="register-link">
      ¿No tienes cuenta?
      <a href="javascript:void(0)" (click)="navigateToRegister()" class="link">
        Regístrate
      </a>
    </p>

    <div class="demo-accounts">
      <p class="demo-title">Cuentas demo:</p>
      <p class="demo-text">admin@jms.com / admin123</p>
      <p class="demo-text">cliente@jms.com / cliente123</p>
    </div>
  </div>
</div>
