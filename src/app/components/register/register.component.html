<div class="register-container">
  <div class="register-card">
    <div class="logo">✂</div>
    <h1>JMS Barber Shop</h1>
    <p class="subtitle">Completa tus datos para registrarte</p>

    <div *ngIf="success" class="success-message">
      ¡Registro exitoso! Redirigiendo al login...
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" *ngIf="!success">
      <div class="form-group">
        <label>Tipo de cuenta</label>
        <select formControlName="role" class="form-input">
          <option value="cliente">Cliente</option>
          <option value="barbero">Barbero</option>
          <option value="administrador">Administrador</option>
        </select>
      </div>

      <div class="form-group">
        <label>Nombre completo</label>
        <input
          type="text"
          placeholder="Tu nombre"
          formControlName="nombre"
          class="form-input"
        />
      </div>

      <div class="form-group">
        <label>Correo electrónico</label>
        <input
          type="email"
          placeholder="correo@ejemplo.com"
          formControlName="email"
          class="form-input"
        />
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input
          type="password"
          placeholder="Contraseña"
          formControlName="password"
          class="form-input"
        />
      </div>

      <div class="form-group">
        <label>Confirmar contraseña</label>
        <input
          type="password"
          placeholder="Repite la contraseña"
          formControlName="confirmPassword"
          class="form-input"
        />
      </div>

      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>

      <button
        type="submit"
        [disabled]="registerForm.invalid || loading"
        class="btn-primary"
      >
        {{ loading ? 'Registrando...' : 'Crear Cuenta' }}
      </button>
    </form>

    <p class="login-link">
      ¿Ya tienes cuenta?
      <a href="javascript:void(0)" (click)="navigateToLogin()" class="link">
        Inicia sesión
      </a>
    </p>
  </div>
</div>
